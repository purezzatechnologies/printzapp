<svg viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Printzapp">
  <!-- top corner ears -->
  <rect x="30" y="40" width="30" height="40" rx="9" fill="#2BA9E0"/>
  <rect x="140" y="40" width="30" height="40" rx="9" fill="#2BA9E0"/>
  <!-- center paper feed -->
  <rect x="64" y="18" width="72" height="54" rx="5" fill="#2BA9E0"/>
  <!-- printer body -->
  <rect x="22" y="60" width="156" height="94" rx="16" fill="#1B2A63"/>
  <!-- wordmark: Printz -->
  <text x="100" y="124" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="46" fill="#FFFFFF">Printz</text>
  <!-- output sheet -->
  <rect x="52" y="134" width="96" height="56" rx="5" fill="#2BA9E0"/>
  <!-- app -->
  <text x="100" y="162" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-weight="800" font-size="26" fill="#1B2A63">app</text>
  <!-- printed lines -->
  <rect x="66" y="171" width="68" height="5" rx="2.5" fill="#1B2A63"/>
  <rect x="66" y="181" width="46" height="5" rx="2.5" fill="#1B2A63"/>
</svg>
